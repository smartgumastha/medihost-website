<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Payment Successful — MediHost™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F9FAFB;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#374151}
.card{background:#fff;border-radius:16px;padding:48px 40px;max-width:440px;width:90%;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,.08)}
.icon{width:72px;height:72px;border-radius:50%;background:#E8F7F1;color:#1D9E75;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;animation:pop .5s ease}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;color:#111827;margin-bottom:8px}
p{font-size:14px;color:#6B7280;line-height:1.6;margin-bottom:24px}
.txn{font-size:12px;color:#9CA3AF;background:#F3F4F6;padding:6px 14px;border-radius:6px;display:inline-block;margin-bottom:20px;font-family:monospace}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none}
.btn:hover{background:#178A65}
</style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="fas fa-check"></i></div>
  <h1>Payment Successful!</h1>
  <p>Your plan has been activated. All features are now unlocked.</p>
  <div class="txn" id="txnId"></div>
  <br><br>
  <a href="https://app.hemato.in" class="btn">Open Dashboard <i class="fas fa-arrow-right" style="font-size:13px"></i></a>
</div>
<script>
var p = new URLSearchParams(window.location.search);
var txn = p.get('txn');
if (txn) document.getElementById('txnId').textContent = 'Transaction: ' + txn;
else document.getElementById('txnId').style.display = 'none';
</script>
</body>
</html>

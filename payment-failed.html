<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Payment Failed — MediHost™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F9FAFB;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#374151}
.card{background:#fff;border-radius:16px;padding:48px 40px;max-width:440px;width:90%;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,.08)}
.icon{width:72px;height:72px;border-radius:50%;background:#FEE2E2;color:#EF4444;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px}
h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;color:#111827;margin-bottom:8px}
p{font-size:14px;color:#6B7280;line-height:1.6;margin-bottom:24px}
.reason{font-size:12px;color:#9CA3AF;background:#F3F4F6;padding:6px 14px;border-radius:6px;display:inline-block;margin-bottom:20px}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;border:none}
.btn-primary{background:#1D9E75;color:#fff}.btn-primary:hover{background:#178A65}
.btn-outline{background:#fff;color:#374151;border:1.5px solid #E5E7EB}.btn-outline:hover{border-color:#1D9E75;color:#1D9E75}
</style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="fas fa-times"></i></div>
  <h1>Payment Failed</h1>
  <p>Your payment could not be processed. No amount has been charged. Please try again or contact support.</p>
  <div class="reason" id="reason"></div>
  <br><br>
  <div class="btns">
    <a href="https://medihost.in/#pricing" class="btn btn-primary"><i class="fas fa-redo"></i> Try Again</a>
    <a href="mailto:sai@smartgumastha.com" class="btn btn-outline"><i class="fas fa-envelope"></i> Contact Support</a>
  </div>
</div>
<script>
var p = new URLSearchParams(window.location.search);
var reason = p.get('reason');
var el = document.getElementById('reason');
if (reason) el.textContent = 'Reason: ' + reason;
else el.style.display = 'none';
</script>
</body>
</html>

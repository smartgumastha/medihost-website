<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0a0a0b;color:#e4e4e7;min-height:100vh}
.wrap{max-width:1200px;margin:0 auto;padding:16px}
.hdr{display:flex;align-items:flex-end;justify-content:space-between;padding:12px 0 16px;border-bottom:2px solid #27272a;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:20px;font-weight:700;color:#fafafa;letter-spacing:-0.5px}
.hdr .sub{font-size:11px;color:#52525b;margin-top:2px}
.hdr .sub span{color:#a1a1aa}
.brand{font-size:10px;font-weight:700;color:#ef4444;letter-spacing:1.5px;text-transform:uppercase}
.nav{display:flex;gap:4px;flex-wrap:wrap}
.nav button{padding:5px 14px;border-radius:6px;border:1px solid #27272a;background:#18181b;color:#71717a;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.nav button.on{border-color:#fafafa;background:#fafafa;color:#09090b}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:6px;margin-bottom:16px}
.stat{padding:12px 14px;border-radius:10px;background:#18181b;border:1px solid #27272a}
.stat .n{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600}
.stat .l{font-size:10px;color:#52525b;font-weight:600;margin-top:2px;letter-spacing:0.3px;text-transform:uppercase}
.chart-row{display:grid;grid-template-columns:220px 1fr;gap:12px;margin-bottom:16px}
@media(max-width:700px){.chart-row{grid-template-columns:1fr}}
.card{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:16px;overflow:hidden}
.card h3{font-size:13px;font-weight:700;color:#a1a1aa;margin-bottom:12px;letter-spacing:0.3px}
.ring-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-center{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:700;color:#fafafa}
.ring-label{font-size:11px;color:#52525b;margin-top:2px}
.branch-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.branch-bar .info{min-width:120px;display:flex;align-items:center;gap:6px}
.branch-bar .icon{font-size:14px}
.branch-bar .nm{font-size:11px;font-weight:600;color:#a1a1aa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.branch-bar .track{flex:1;height:18px;background:#27272a;border-radius:4px;overflow:hidden;position:relative;min-width:60px}
.branch-bar .fill{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(0.22,1,0.36,1)}
.branch-bar .pct{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;min-width:36px;text-align:right}
.branch-bar .cnt{font-size:10px;color:#52525b;min-width:30px;text-align:right}
.streak-card{display:flex;align-items:center;gap:14px;padding:14px 18px;background:linear-gradient(135deg,#18181b 0%,#1c1917 100%);border:1px solid #292524;border-radius:12px;margin-bottom:16px}
.streak-num{font-family:'JetBrains Mono',monospace;font-size:42px;font-weight:700;color:#f59e0b;line-height:1}
.streak-info{flex:1}
.streak-info .t{font-size:14px;font-weight:700;color:#fafafa}
.streak-info .d{font-size:11px;color:#78716c;margin-top:2px}
.milestone{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.milestone .dot{width:10px;height:10px;border-radius:50%;border:2px solid #27272a}
.milestone .dot.lit{border-color:#f59e0b;background:#f59e0b}
.timeline-card{margin-bottom:16px}
.day-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.day-row .day{font-family:'JetBrains Mono',monospace;font-size:10px;color:#52525b;min-width:50px}
.day-row .bar-track{flex:1;height:14px;background:#27272a;border-radius:3px;overflow:hidden;position:relative}
.day-row .bar-fill{height:100%;border-radius:3px}
.day-row .count{font-family:'JetBrains Mono',monospace;font-size:10px;color:#71717a;min-width:20px;text-align:right}
.branch-card{margin-bottom:10px;border:1px solid #27272a;border-radius:10px;overflow:hidden}
.branch-head{padding:8px 12px;background:#18181b;border-bottom:1px solid #27272a;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.branch-head .left{display:flex;align-items:center;gap:6px}
.branch-head .nm{font-size:13px;font-weight:700;color:#e4e4e7}
.branch-head .desc{font-size:10px;color:#52525b}
.branch-body{padding:6px}
.task{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;margin-bottom:3px;border-radius:6px;border:1px solid #1f1f23;transition:border-color 0.1s}
.task:hover{border-color:#3f3f46}
.task select{padding:3px 4px;border-radius:5px;border:1px solid #3f3f46;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;min-width:82px;background:#18181b;color:#a1a1aa}
.task .info{flex:1;min-width:0}
.task .name{font-size:12px;font-weight:600;color:#e4e4e7}
.task .note{font-size:10px;color:#52525b;margin-top:1px}
.task .where{font-size:10px;color:#78716c;margin-top:1px}
.task .meta{display:flex;gap:6px;margin-top:2px;flex-wrap:wrap}
.task .meta span{font-size:9px;color:#3f3f46}
.task .blocked{color:#ef4444;font-weight:600}
.task .deps-met{color:#22c55e}
.task .tid{font-size:9px;color:#27272a}
.badge{font-size:9px;padding:1px 6px;border-radius:4px;font-weight:600}
.fix-badge{background:#052e16;color:#22c55e}
.type-badge-code{background:#172554;color:#3b82f6}
.type-badge-ops{background:#2e1065;color:#a855f7}
.type-badge-vendor{background:#052e16;color:#22c55e}
.type-badge-test{background:#431407;color:#f97316}
.add-form{padding:14px;margin-bottom:14px;background:#18181b;border:1px solid #27272a;border-radius:10px}
.add-form input,.add-form select{background:#09090b;border:1px solid #27272a;color:#e4e4e7;padding:6px 8px;border-radius:6px;font-size:12px;font-family:inherit;width:100%}
.add-form label{font-size:10px;color:#52525b;display:block;margin-bottom:3px}
.add-form .row{display:grid;gap:8px;margin-bottom:8px}
.add-form .r2{grid-template-columns:1fr 1fr}
.add-form .r4{grid-template-columns:1fr 1fr 1fr 1fr}
.add-form button{padding:6px 16px;border-radius:6px;border:1px solid #27272a;background:#27272a;color:#fafafa;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.add-form button:hover{background:#3f3f46}
.log-entry{margin-bottom:12px}
.log-head{font-size:12px;font-weight:700;color:#a1a1aa;padding:6px 10px;background:#18181b;border-radius:6px 6px 0 0;border:1px solid #27272a;border-bottom:2px solid #22c55e}
.log-body{border:1px solid #27272a;border-top:none;border-radius:0 0 6px 6px;padding:6px}
.log-item{display:flex;gap:8px;padding:5px 8px;margin-bottom:2px;border-radius:4px;background:#09090b}
.log-tag{font-size:10px;padding:1px 7px;border-radius:4px;font-weight:600;min-width:60px;text-align:center}
.footer{text-align:center;padding:20px 0;font-size:10px;color:#27272a}
.quote{text-align:center;padding:10px;margin-bottom:16px;font-style:italic;color:#3f3f46;font-size:12px;border:1px solid #1f1f23;border-radius:8px;background:#18181b}
.filter-row{display:flex;gap:3px;margin-bottom:12px;flex-wrap:wrap}
.filter-row button{padding:3px 9px;border-radius:5px;border:1px solid #27272a;background:#18181b;color:#52525b;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit}
.filter-row button.on{border-color:#fafafa;background:#fafafa;color:#09090b}

{id:"n57",name:"Check PostgreSQL backups",s:"todo",p:"high",type:"ops",dep:[],eff:"3 min",dl:"Apr 6",note:"Daily backups enabled?",where:"Railway"},
{id:"t48",name:"Seed-demo idempotent",s:"todo",p:"low",type:"code",dep:[],eff:"15 min",dl:"Apr 10",note:"Check-before-insert."},
{id:"t49",name:"Doctor placeholder photos",s:"todo",p:"low",type:"code",dep:[],eff:"15 min",dl:"Apr 10",note:"Generic avatar or upload."}
]}
]};

var state = {data:null,view:"dashboard",filter:"all",typeFilter:"all",showAdd:false,collapsed:{}};

function init(){
  var saved = localStorage.getItem(SK);
  if(saved){try{var d=JSON.parse(saved);if(d.v===6)state.data=d;else state.data=JSON.parse(JSON.stringify(DEFAULT))}catch(e){state.data=JSON.parse(JSON.stringify(DEFAULT))}}
  else state.data=JSON.parse(JSON.stringify(DEFAULT));
  updateStreak();
  render();
}

function save(){state.data.updated=Date.now();localStorage.setItem(SK,JSON.stringify(state.data))}

function updateStreak(){
  var today=new Date().toISOString().split('T')[0];
  var s=state.data.streak;
  if(!s){state.data.streak={count:1,lastDate:today};return}
  if(s.lastDate===today)return;
  var yesterday=new Date(Date.now()-86400000).toISOString().split('T')[0];
  if(s.lastDate===yesterday){s.count++;s.lastDate=today}
  else{s.count=1;s.lastDate=today}
}

function recordHistory(){
  var today=new Date().toISOString().split('T')[0];
  var all=getAllTasks();
  var done=all.filter(function(t){return t.t.s==="done"}).length;
  var hist=state.data.history||(state.data.history=[]);
  var existing=hist.find(function(h){return h.date===today});
  if(existing)existing.done=done;
  else hist.push({date:today,done:done,total:all.length});
  if(hist.length>30)hist.shift();
}

function getAllTasks(){
  var tasks=[];
  state.data.branches.forEach(function(b){b.tasks.forEach(function(t){tasks.push({t:t,b:b})})});
  return tasks;
}

function getBlockedBy(task){
  if(!task.dep||!task.dep.length)return[];
  var all=getAllTasks();
  return task.dep.map(function(did){var f=all.find(function(a){return a.t.id===did});return f?f.t:null}).filter(function(t){return t&&t.s!=="done"&&t.s!=="wont_do"});
}

function autoUnblock(){
  var all=getAllTasks();
  all.forEach(function(a){
    if(a.t.s==="blocked"&&a.t.dep&&a.t.dep.length){
      var met=a.t.dep.every(function(did){var d=all.find(function(x){return x.t.id===did});return!d||d.t.s==="done"||d.t.s==="wont_do"});
      if(met)a.t.s="ready";
    }
  });
}

function updateStatus(taskId,newStatus){
  state.data.branches.forEach(function(b){b.tasks.forEach(function(t){
    if(t.id===taskId){t.s=newStatus;if(newStatus==="done"&&!t.fix)t.fix=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"})}
  })});
  autoUnblock();recordHistory();save();render();
}

function addTask(){
  var nm=document.getElementById("addName").value.trim();if(!nm)return;
  var bid=document.getElementById("addBranch").value;
  var br=state.data.branches.find(function(b){return b.id===bid});if(!br)return;
  var id="x"+Date.now().toString(36);
  br.tasks.push({id:id,name:nm,s:"todo",p:document.getElementById("addPri").value,type:document.getElementById("addType").value,dep:[],eff:document.getElementById("addEff").value||"",dl:document.getElementById("addDl").value||"",note:document.getElementById("addNote").value||"",where:document.getElementById("addWhere").value||""});
  save();state.showAdd=false;render();
}

function setView(v){state.view=v;render()}
function setFilter(f){state.filter=f;render()}
function setTypeFilter(f){state.typeFilter=f;render()}
function toggleCollapse(bid){state.collapsed[bid]=!state.collapsed[bid];render()}
function toggleAdd(){state.showAdd=!state.showAdd;render()}

function render(){
  var d=state.data;var all=getAllTasks();
  var stats={total:all.length,done:all.filter(function(a){return a.t.s==="done"}).length,inp:all.filter(function(a){return a.t.s==="in_progress"}).length,rdy:all.filter(function(a){return a.t.s==="ready"}).length,blk:all.filter(function(a){return a.t.s==="blocked"}).length,crit:all.filter(function(a){return a.t.p==="critical"}).length,critD:all.filter(function(a){return a.t.p==="critical"&&a.t.s==="done"}).length};
  var pct=stats.total?Math.round(stats.done/stats.total*100):0;

  var filtered=all;
  if(state.filter!=="all")filtered=filtered.filter(function(a){return a.b.id===state.filter});
  if(state.typeFilter!=="all")filtered=filtered.filter(function(a){return a.t.type===state.typeFilter});

  var h="";
  var quote=QUOTES[Math.floor(Math.random()*QUOTES.length)];

  // Header
  h+='<div class="hdr"><div><div class="brand">SmartGumastha Technologies</div><h1>MediHost Command Center</h1>';
  h+='<div class="sub">Updated: <span>'+new Date(d.updated).toLocaleString()+'</span> \u00B7 '+stats.done+'/'+stats.total+' tasks ('+pct+'%)</div></div>';
  h+='<div class="nav">';
  ["dashboard","board","changelog"].forEach(function(v){h+='<button class="'+(state.view===v?"on":"")+'" onclick="setView(\''+v+'\')">'+({dashboard:"Dashboard",board:"All Tasks",changelog:"Changelog"}[v])+'</button>'});
  h+='<button class="'+(state.showAdd?"on":"")+'" onclick="toggleAdd()">+ Add</button>';
  h+='</div></div>';

  // Quote
  h+='<div class="quote">"'+quote+'"</div>';

  // Add form
  if(state.showAdd){
    h+='<div class="add-form">';
    h+='<div class="row r2"><div><label>Task name</label><input id="addName" placeholder="What needs doing?"></div>';
    h+='<div><label>Branch</label><select id="addBranch">';
    d.branches.forEach(function(b){h+='<option value="'+b.id+'">'+b.icon+' '+b.name+'</option>'});
    h+='</select></div></div>';
    h+='<div class="row r4"><div><label>Priority</label><select id="addPri"><option value="critical">Critical</option><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></div>';
    h+='<div><label>Type</label><select id="addType"><option value="code">Code</option><option value="ops">Ops</option><option value="vendor">Vendor</option><option value="test">Test</option></select></div>';
    h+='<div><label>Deadline</label><input id="addDl" placeholder="Apr 10"></div>';
    h+='<div><label>Effort</label><input id="addEff" placeholder="1 session"></div></div>';
    h+='<div class="row r2"><div><label>Notes</label><input id="addNote" placeholder="Details..."></div>';
    h+='<div><label>Where (for ops)</label><input id="addWhere" placeholder="Razorpay panel"></div></div>';
    h+='<button onclick="addTask()">Add Task</button></div>';
  }

  // DASHBOARD VIEW
  if(state.view==="dashboard"){
    // Stats
    h+='<div class="stats-grid">';
    [{l:"Total",v:stats.total,c:"#fafafa"},{l:"Done",v:stats.done,c:"#22c55e"},{l:"Active",v:stats.inp,c:"#f97316"},{l:"Ready",v:stats.rdy,c:"#3b82f6"},{l:"Blocked",v:stats.blk,c:"#ef4444"},{l:"Critical",v:(stats.crit-stats.critD)+"/"+stats.crit,c:"#ef4444"}].forEach(function(s){
      h+='<div class="stat"><div class="n" style="color:'+s.c+'">'+s.v+'</div><div class="l">'+s.l+'</div></div>';
    });
    h+='</div>';

    // Streak + Ring
    h+='<div class="streak-card"><div class="streak-num">'+(d.streak?d.streak.count:1)+'</div><div class="streak-info"><div class="t">Day Streak \u{1F525}</div><div class="d">Consecutive days working on MediHost</div>';
    h+='<div class="milestone">';
    for(var mi=0;mi<7;mi++){h+='<div class="dot '+(mi<(d.streak?d.streak.count:1)?"lit":"")+'"></div>'}
    h+='</div></div></div>';

    // Charts row
    h+='<div class="chart-row">';

    // Ring chart
    h+='<div class="card ring-wrap"><h3>Overall Progress</h3>';
    var radius=70,circ=2*Math.PI*radius,offset=circ-(pct/100)*circ;
    h+='<svg width="170" height="170" style="transform:rotate(-90deg)">';
    h+='<circle cx="85" cy="85" r="'+radius+'" fill="none" stroke="#27272a" stroke-width="12"/>';
    h+='<circle cx="85" cy="85" r="'+radius+'" fill="none" stroke="'+(pct>60?"#22c55e":pct>30?"#f97316":"#ef4444")+'" stroke-width="12" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'" style="transition:stroke-dashoffset 1s cubic-bezier(0.22,1,0.36,1)"/>';
    h+='</svg>';
    h+='<div class="ring-center" style="margin-top:-110px">'+pct+'%</div>';
    h+='<div class="ring-label" style="margin-top:4px">'+stats.done+' of '+stats.total+' tasks</div>';
    h+='</div>';

    // Branch bars
    h+='<div class="card"><h3>Progress by Branch</h3>';
    d.branches.forEach(function(b){
      var bd=b.tasks.filter(function(t){return t.s==="done"}).length;
      var bt=b.tasks.length;
      var bp=bt?Math.round(bd/bt*100):0;
      h+='<div class="branch-bar">';
      h+='<div class="info"><span class="icon">'+b.icon+'</span><span class="nm">'+b.name+'</span></div>';
      h+='<div class="track"><div class="fill" style="width:'+bp+'%;background:'+b.color+'"></div></div>';
      h+='<div class="pct" style="color:'+b.color+'">'+bp+'%</div>';
      h+='<div class="cnt">'+bd+'/'+bt+'</div>';
      h+='</div>';
    });
    h+='</div></div>';

    // Daily burndown
    var hist=d.history||[];
    if(hist.length>0){
      h+='<div class="card timeline-card"><h3>Daily Progress (tasks completed)</h3>';
      var maxDone=Math.max.apply(null,hist.map(function(x){return x.done}))||1;
      hist.slice(-14).forEach(function(day){
        var dp=Math.round(day.done/day.total*100);
        var label=day.date.slice(5);
        h+='<div class="day-row">';
        h+='<div class="day">'+label+'</div>';
        h+='<div class="bar-track"><div class="bar-fill" style="width:'+dp+'%;background:'+(dp>60?"#22c55e":dp>30?"#f97316":"#ef4444")+'"></div></div>';
        h+='<div class="count">'+day.done+'</div>';
        h+='</div>';
      });
      h+='</div>';
    }

    // What's next
    h+='<div class="card"><h3>Up Next — Ready to Work</h3>';
    var ready=all.filter(function(a){return a.t.s==="ready"||a.t.s==="in_progress"}).sort(function(a,b){var po={critical:0,high:1,medium:2,low:3};return(po[a.t.p]||3)-(po[b.t.p]||3)});
    if(!ready.length)h+='<div style="font-size:12px;color:#52525b;padding:8px">No tasks ready — check blocked items!</div>';
    ready.slice(0,8).forEach(function(a){
      var sc=ST[a.t.s];var pc=PR[a.t.p];var tc=TC[a.t.type]||TC.code;
      h+='<div class="task">';
      h+=makeSelect(a.t);
      h+='<div class="info"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap"><span class="name">'+a.t.name+'</span>';
      h+='<span class="badge type-badge-'+a.t.type+'">'+tc.l+'</span>';
      h+='<span class="badge" style="background:'+pc.c+'18;color:'+pc.c+'">'+pc.l+'</span></div>';
      h+='<div class="note">'+a.t.note+'</div>';
      h+='<div class="meta"><span>'+a.b.icon+' '+a.b.name+'</span>';
      if(a.t.dl)h+='<span>\u{1F4C5}'+a.t.dl+'</span>';
      h+='</div></div>';
      h+='<span class="tid">'+a.t.id+'</span></div>';
    });
    h+='</div>';
  }

  // BOARD VIEW
  if(state.view==="board"){
    // Type filter
    h+='<div class="filter-row">';
    ["all","code","ops","vendor","test"].forEach(function(t){
      var cnt=t==="all"?all.length:all.filter(function(a){return a.t.type===t}).length;
      h+='<button class="'+(state.typeFilter===t?"on":"")+'" onclick="setTypeFilter(\''+t+'\')">'+(t==="all"?"All":TC[t]?TC[t].l:t)+' ('+cnt+')</button>';
    });
    h+='</div>';
    // Branch filter
    h+='<div class="filter-row">';
    h+='<button class="'+(state.filter==="all"?"on":"")+'" onclick="setFilter(\'all\')">All</button>';
    d.branches.forEach(function(b){
      h+='<button class="'+(state.filter===b.id?"on":"")+'" onclick="setFilter(\''+b.id+'\')">'+b.icon+' '+b.name+'</button>';
    });
    h+='</div>';

    var fb=state.filter==="all"?d.branches:d.branches.filter(function(b){return b.id===state.filter});
    fb.forEach(function(branch){
      var bt=branch.tasks;
      if(state.typeFilter!=="all")bt=bt.filter(function(t){return t.type===state.typeFilter});
      if(!bt.length)return;
      var bd=bt.filter(function(t){return t.s==="done"}).length;
      var bp=bt.length?Math.round(bd/bt.length*100):0;
      var collapsed=state.collapsed[branch.id];

      h+='<div class="branch-card"><div class="branch-head" onclick="toggleCollapse(\''+branch.id+'\')">';
      h+='<div class="left"><span>'+branch.icon+'</span><span class="nm">'+branch.name+'</span><span class="desc">'+bd+'/'+bt.length+' ('+bp+'%)</span></div>';
      h+='<div style="display:flex;align-items:center;gap:6px"><div style="width:60px;height:4px;border-radius:2px;background:#27272a;overflow:hidden"><div style="width:'+bp+'%;height:100%;background:'+branch.color+';border-radius:2px"></div></div>';
      h+='<span style="font-size:11px;font-weight:600;color:'+branch.color+'">'+bp+'%</span>';
      h+='<span style="font-size:10px;color:#52525b">'+(collapsed?'\u25B6':'\u25BC')+'</span></div></div>';

      if(!collapsed){
        h+='<div class="branch-body">';
        bt.forEach(function(task){
          var sc=ST[task.s];var pc=PR[task.p];var tc=TC[task.type]||TC.code;
          var blocked=getBlockedBy(task);var done=task.s==="done";
          h+='<div class="task" style="opacity:'+(done?0.4:1)+'">';
          h+=makeSelect(task);
          h+='<div class="info"><div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">';
          h+='<span class="name" style="text-decoration:'+(done?"line-through":"none")+'">'+task.name+'</span>';
          h+='<span class="badge type-badge-'+task.type+'">'+tc.l+'</span>';
          h+='<span class="badge" style="background:'+pc.c+'18;color:'+pc.c+'">'+pc.l+'</span>';
          if(task.fix)h+='<span class="badge fix-badge">FIXED '+task.fix+'</span>';
          h+='</div>';
          h+='<div class="note">'+task.note+'</div>';
          if(task.where)h+='<div class="where">\u{1F4CD} '+task.where+'</div>';
          if(task.res)h+='<div style="font-size:10px;color:#22c55e;margin-top:1px;font-style:italic">Fix: '+task.res+'</div>';
          h+='<div class="meta">';
          if(task.eff)h+='<span>\u23F1'+task.eff+'</span>';
          if(task.dl)h+='<span>\u{1F4C5}'+task.dl+'</span>';
          if(blocked.length)h+='<span class="blocked">\u{1F6AB} Blocked: '+blocked.map(function(b){return b.name}).join(", ")+'</span>';
          else if(task.dep&&task.dep.length&&!done)h+='<span class="deps-met">\u2705 Deps met</span>';
          h+='</div></div>';
          h+='<span class="tid">'+task.id+'</span></div>';
        });
        h+='</div>';
      }
      h+='</div>';
    });
  }

  // CHANGELOG VIEW
  if(state.view==="changelog"){
    (d.log||[]).forEach(function(entry){
      h+='<div class="log-entry"><div class="log-head">'+entry.d+'</div><div class="log-body">';
      entry.items.forEach(function(item){
        var ac={fixed:"#22c55e",closed:"#3b82f6",unblocked:"#f97316"};
        h+='<div class="log-item"><span class="log-tag" style="background:'+(ac[item.a]||"#52525b")+'22;color:'+(ac[item.a]||"#52525b")+'">'+item.a.toUpperCase()+'</span>';
        h+='<div style="flex:1"><span style="font-size:12px;font-weight:600;color:#e4e4e7">'+item.t+'</span>';
        h+='<div style="font-size:11px;color:#52525b;margin-top:1px">'+item.n+'</div></div></div>';
      });
      h+='</div></div>';
    });
    // Fixed summary
    var fixed=all.filter(function(a){return a.t.fix});
    if(fixed.length){
      h+='<div class="card" style="margin-top:12px;border-color:#052e16"><h3 style="color:#22c55e">All Fixed Tasks ('+fixed.length+')</h3>';
      fixed.forEach(function(a){
        h+='<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px">';
        h+='<span style="color:#22c55e;font-weight:600;min-width:28px">'+a.t.id+'</span>';
        h+='<span style="color:#a1a1aa;text-decoration:line-through;flex:1">'+a.t.name+'</span>';
        h+='<span style="font-size:10px;color:#22c55e">'+a.t.fix+'</span></div>';
      });
      h+='</div>';
    }
  }

  // Footer
  h+='<div class="footer">SmartGumastha Technologies \u00B7 MediHost\u2122 Command Center v6 \u00B7 '+stats.done+'/'+stats.total+' ('+pct+'%) \u00B7 Built with \u2764\uFE0F by a solo founder</div>';

  document.getElementById("app").innerHTML=h;
}

function makeSelect(task){
  var sc=ST[task.s];
  var h='<select onchange="updateStatus(\''+task.id+'\',this.value)" style="color:'+sc.c+';background:'+sc.bg+';border-color:'+sc.c+'40">';
  Object.keys(ST).forEach(function(s){h+='<option value="'+s+'"'+(task.s===s?" selected":"")+'>'+ST[s].i+' '+ST[s].l+'</option>'});
  h+='</select>';
  return h;
}

init();
</script>
</body>
</html>

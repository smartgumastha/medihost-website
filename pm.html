<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediHost Command Center v6</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0b;--card:#18181b;--border:#27272a;--text:#e4e4e7;--text2:#a1a1aa;--done:#22c55e;--in_progress:#f97316;--ready:#3b82f6;--todo:#71717a;--blocked:#ef4444;--partial:#a855f7;--wont_do:#525252;--critical:#ef4444;--high:#f97316;--medium:#eab308;--low:#3b82f6}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:#111113}
header h1{font-size:18px;font-weight:700;letter-spacing:-0.5px}
header h1 span{color:var(--in_progress)}
.nav-btns{display:flex;gap:6px}
.nav-btn{padding:7px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .15s}
.nav-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.nav-btn:hover:not(.active){border-color:var(--text2)}
#addBtn{padding:7px 14px;border:1px solid var(--done);border-radius:8px;background:transparent;color:var(--done);cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif}
#addBtn:hover{background:var(--done);color:#000}
main{max-width:1200px;margin:0 auto;padding:24px}
.view{display:none}.view.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.stat-card .num{font-size:28px;font-weight:700;line-height:1}
.stat-card .lbl{font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.dash-card h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text2)}
.streak-wrap{display:flex;align-items:center;gap:18px}
.streak-num{font-size:52px;font-weight:700;line-height:1}
.streak-dots{display:flex;gap:5px;margin-top:8px}
.streak-dot{width:10px;height:10px;border-radius:50%;background:var(--border)}
.streak-dot.lit{background:var(--in_progress)}
.ring-wrap{display:flex;align-items:center;justify-content:center;position:relative}
.ring-pct{position:absolute;font-size:28px;font-weight:700}
.branch-bar{margin-bottom:8px}
.branch-bar-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;font-size:12px}
.branch-bar-track{height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.branch-bar-fill{height:100%;border-radius:5px;transition:width .4s}
.burn-bar{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:11px}
.burn-bar .burn-lbl{width:50px;text-align:right;color:var(--text2)}
.burn-bar .burn-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;display:flex}
.burn-bar .burn-done{height:100%;background:var(--done);border-radius:4px 0 0 4px}
.burn-bar .burn-rem{height:100%;background:var(--border)}
.burn-bar .burn-ct{width:40px;color:var(--text2)}
.upnext-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:13px}
.upnext-pri{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;text-transform:uppercase}
.quote-box{text-align:center;padding:16px;font-style:italic;color:var(--text2);font-size:14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:20px}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.fbtn{padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif}
.fbtn.active{background:var(--text);color:var(--bg)}
.branch-section{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden}
.branch-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none}
.branch-hdr:hover{background:#1f1f23}
.branch-hdr-left{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px}
.branch-hdr-bar{flex:1;max-width:200px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:0 12px}
.branch-hdr-fill{height:100%;border-radius:3px}
.branch-hdr-count{font-size:12px;color:var(--text2)}
.branch-hdr .chevron{transition:transform .2s;color:var(--text2)}
.branch-hdr.open .chevron{transform:rotate(180deg)}
.branch-body{display:none;padding:0 16px 14px}
.branch-body.open{display:block}
.task-row{display:grid;grid-template-columns:120px 1fr auto;gap:8px;align-items:start;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.task-row:last-child{border-bottom:none}
.task-status select{padding:4px 6px;border:1px solid var(--border);border-radius:5px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--text);outline:none}
.task-name{font-weight:500}
.badge{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:600;margin-left:4px}
.badge-code{background:#1e3a5f;color:#60a5fa}.badge-ops{background:#3b2f1a;color:#f59e0b}.badge-vendor{background:#2d1f3d;color:#c084fc}.badge-test{background:#1a2f2f;color:#2dd4bf}
.badge-critical{background:#3b1111;color:#f87171}.badge-high{background:#3b2811;color:#fb923c}.badge-medium{background:#3b3511;color:#facc15}.badge-low{background:#112840;color:#60a5fa}
.fixed-badge{background:#052e16;color:#4ade80;padding:2px 7px;border-radius:4px;font-size:10px;margin-left:4px}
.task-meta{font-size:11px;color:var(--text2);margin-top:2px}
.task-blocked{color:var(--blocked);font-size:11px}
.task-deps-met{color:var(--done);font-size:11px}
.task-where{color:var(--in_progress);font-size:11px}
.changelog-day{margin-bottom:18px}
.changelog-day h3{font-size:14px;font-weight:600;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.cl-entry{padding:6px 0;font-size:13px;display:flex;align-items:center;gap:8px}
.cl-tag{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.cl-tag-fixed{background:#052e16;color:#4ade80}.cl-tag-closed{background:#1e1b4b;color:#818cf8}.cl-tag-unblocked{background:#172554;color:#60a5fa}
.add-form{display:none;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:20px}
.add-form.open{display:block}
.add-form h3{margin-bottom:12px;font-size:15px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid label{font-size:12px;color:var(--text2);display:flex;flex-direction:column;gap:4px}
.form-grid input,.form-grid select,.form-grid textarea{padding:7px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif}
.form-grid textarea{grid-column:span 2;resize:vertical;height:60px}
.form-actions{margin-top:12px;display:flex;gap:8px}
.form-actions button{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif}
.form-actions .save-btn{background:var(--done);color:#000;font-weight:600}
.form-actions .cancel-btn{background:var(--border);color:var(--text)}
@media(max-width:768px){.stats-grid{grid-template-columns:repeat(3,1fr)}.dash-grid{grid-template-columns:1fr}.task-row{grid-template-columns:100px 1fr}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>Medi<span>Host</span> Command Center <small style="font-weight:400;color:var(--text2);font-size:12px">v6</small></h1>
  <div style="display:flex;gap:8px;align-items:center">
    <div class="nav-btns">
      <button class="nav-btn active" onclick="showView('dashboard')">Dashboard</button>
      <button class="nav-btn" onclick="showView('tasks')">All Tasks</button>
      <button class="nav-btn" onclick="showView('changelog')">Changelog</button>
    </div>
    <button id="addBtn" onclick="toggleAddForm()">+ Add Task</button>
  </div>
</header>
<main>
  <div class="add-form" id="addForm">
    <h3>Add New Task</h3>
    <div class="form-grid">
      <label>Name<input id="af-name" placeholder="Task name"></label>
      <label>Branch<select id="af-branch"></select></label>
      <label>Priority<select id="af-pri"><option value="critical">Critical</option><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></label>
      <label>Type<select id="af-type"><option value="code">CODE</option><option value="ops">OPS</option><option value="vendor">VENDOR</option><option value="test">TEST</option></select></label>
      <label>Deadline<input id="af-dead" type="date"></label>
      <label>Effort<input id="af-effort" placeholder="e.g. 2h, 1d"></label>
      <label>Where<input id="af-where" placeholder="Location (ops tasks)"></label>
      <label>Notes<input id="af-notes" placeholder="Notes"></label>
    </div>
    <div class="form-actions">
      <button class="save-btn" onclick="addTask()">Add Task</button>
      <button class="cancel-btn" onclick="toggleAddForm()">Cancel</button>
    </div>
  </div>

  <div class="view active" id="view-dashboard"></div>
  <div class="view" id="view-tasks"></div>
  <div class="view" id="view-changelog"></div>
</main>

var DEFAULT_CHANGELOG = [
  {date:"Apr 5 Night",entries:[
    {tag:"closed",text:"t1 \u2014 V44 apiRequest\u2192api.get fix verified, never broken"},
    {tag:"fixed",text:"t9 \u2014 Admin pricing save fix (subscription_plan \u2192 plan_tier)"},
    {tag:"fixed",text:"t45 \u2014 Module gating fix (shared modules.js + dedup)"}
  ]}
];

/* ---- STATE ---- */
var state = loadState();

function loadState() {
  try {
    var s = JSON.parse(localStorage.getItem(LS_KEY));
    if (s && s.branches) return s;
  } catch(e) {}
  return {branches:JSON.parse(JSON.stringify(DEFAULT_BRANCHES)),changelog:JSON.parse(JSON.stringify(DEFAULT_CHANGELOG)),streak:{count:0,lastDate:null},burndown:[]};
}

function saveState() {
  localStorage.setItem(LS_KEY, JSON.stringify(state));
}

/* ---- HELPERS ---- */
function allTasks() {
  var out = [];
  state.branches.forEach(function(b) { b.tasks.forEach(function(t) { t._branch = b.id; out.push(t); }); });
  return out;
}

function findTask(id) {
  var all = allTasks();
  for (var i = 0; i < all.length; i++) { if (all[i].id === id) return all[i]; }
  return null;
}

function branchById(id) {
  for (var i = 0; i < state.branches.length; i++) { if (state.branches[i].id === id) return state.branches[i]; }
  return null;
}

function countByStatus(tasks, st) {
  var c = 0; tasks.forEach(function(t) { if (t.status === st) c++; }); return c;
}

function depsMetFor(t) {
  if (!t.dep || !t.dep.length) return true;
  for (var i = 0; i < t.dep.length; i++) {
    var d = findTask(t.dep[i]);
    if (!d || d.status !== "done") return false;
  }
  return true;
}

function todayStr() {
  var d = new Date(); return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function yesterdayStr() {
  var d = new Date(); d.setDate(d.getDate()-1);
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

/* ---- STREAK ---- */
function updateStreak() {
  var today = todayStr();
  var yesterday = yesterdayStr();
  if (state.streak.lastDate === today) return;
  if (state.streak.lastDate === yesterday) {
    state.streak.count++;
  } else if (state.streak.lastDate !== today) {
    state.streak.count = 1;
  }
  state.streak.lastDate = today;
  saveState();
}

/* ---- BURNDOWN ---- */
function recordBurndown() {
  var today = todayStr();
  var all = allTasks();
  var done = countByStatus(all, "done");
  var total = all.length;
  var last = state.burndown.length ? state.burndown[state.burndown.length-1] : null;
  if (last && last.date === today) {
    last.done = done; last.total = total;
  } else {
    state.burndown.push({date:today,done:done,total:total});
  }
  if (state.burndown.length > 30) state.burndown = state.burndown.slice(-30);
  saveState();
}

/* ---- AUTO-UNBLOCK ---- */
function autoUnblock() {
  var changed = false;
  allTasks().forEach(function(t) {
    if (t.status === "blocked" && depsMetFor(t)) {
      t.status = "ready";
      changed = true;
      addChangelog("unblocked", t.id + " \u2014 " + t.name + " auto-unblocked (deps met)");
    }
  });
  if (changed) saveState();
}

function addChangelog(tag, text) {
  var today = todayStr();
  var day = null;
  for (var i = 0; i < state.changelog.length; i++) {
    if (state.changelog[i].date === today) { day = state.changelog[i]; break; }
  }
  if (!day) { day = {date:today,entries:[]}; state.changelog.unshift(day); }
  day.entries.unshift({tag:tag,text:text});
}

/* ---- STATUS CHANGE ---- */
function changeStatus(taskId, newStatus) {
  var t = findTask(taskId);
  if (!t) return;
  var old = t.status;
  t.status = newStatus;
  if (newStatus === "done" && old !== "done") {
    addChangelog("fixed", t.id + " \u2014 " + t.name + " completed");
    updateStreak();
  }
  autoUnblock();
  recordBurndown();
  saveState();
  renderAll();
}

/* ---- VIEWS ---- */
function showView(name) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  var labels = {dashboard:0,tasks:1,changelog:2};
  document.querySelectorAll('.nav-btn')[labels[name]].classList.add('active');
}

/* ---- RENDER DASHBOARD ---- */
function renderDashboard() {
  var el = document.getElementById('view-dashboard');
  var all = allTasks();
  var total = all.length;
  var done = countByStatus(all,"done");
  var active = countByStatus(all,"in_progress");
  var ready = countByStatus(all,"ready");
  var blocked = countByStatus(all,"blocked");
  var critical = 0; all.forEach(function(t){if(t.pri==="critical"&&t.status!=="done")critical++;});
  var pct = total ? Math.round(done/total*100) : 0;
  var ringColor = pct < 30 ? "#ef4444" : pct < 60 ? "#f97316" : "#22c55e";
  var circ = 2 * Math.PI * 70;
  var offset = circ - (pct/100)*circ;

  var h = '';
  // Stats
  h += '<div class="stats-grid">';
  h += statCard(total,"Total","var(--text)") + statCard(done,"Done","var(--done)") + statCard(active,"Active","var(--in_progress)");
  h += statCard(ready,"Ready","var(--ready)") + statCard(blocked,"Blocked","var(--blocked)") + statCard(critical,"Critical","var(--critical)");
  h += '</div>';

  // Quote
  h += '<div class="quote-box">&ldquo;' + QUOTES[Math.floor(Math.random()*QUOTES.length)] + '&rdquo;</div>';

  h += '<div class="dash-grid">';

  // Streak
  var dots = '';
  for (var i = 0; i < 7; i++) dots += '<div class="streak-dot' + (i < (state.streak.count % 7 || (state.streak.count ? 7 : 0)) ? ' lit' : '') + '"></div>';
  h += '<div class="dash-card"><h3>Streak</h3><div class="streak-wrap"><div class="streak-num mono" style="color:var(--in_progress)">' + state.streak.count + '</div><div><div style="font-size:13px;color:var(--text2)">\ud83d\udd25 consecutive days</div><div class="streak-dots">' + dots + '</div><div style="font-size:10px;color:var(--text2);margin-top:4px">7-day milestone tracker</div></div></div></div>';

  // Ring
  h += '<div class="dash-card"><h3>Overall Progress</h3><div class="ring-wrap"><svg width="160" height="160" viewBox="0 0 160 160"><circle cx="80" cy="80" r="70" fill="none" stroke="var(--border)" stroke-width="12"/><circle cx="80" cy="80" r="70" fill="none" stroke="' + ringColor + '" stroke-width="12" stroke-linecap="round" stroke-dasharray="' + circ + '" stroke-dashoffset="' + offset + '" transform="rotate(-90 80 80)" style="transition:stroke-dashoffset .6s"/></svg><div class="ring-pct mono" style="color:' + ringColor + '">' + pct + '%</div></div></div>';

  // Branch bars
  h += '<div class="dash-card"><h3>Branch Progress</h3>';
  state.branches.forEach(function(b) {
    var bd = countByStatus(b.tasks,"done");
    var bt = b.tasks.length;
    var bp = bt ? Math.round(bd/bt*100) : 0;
    h += '<div class="branch-bar"><div class="branch-bar-hdr"><span>' + b.icon + ' ' + b.name + '</span><span class="mono" style="font-size:11px">' + bd + '/' + bt + '</span></div><div class="branch-bar-track"><div class="branch-bar-fill" style="width:' + bp + '%;background:' + b.color + '"></div></div></div>';
  });
  h += '</div>';

  // Burndown
  h += '<div class="dash-card"><h3>Daily Burndown (last 14 days)</h3>';
  var burn = state.burndown.slice(-14);
  if (burn.length === 0) {
    h += '<div style="color:var(--text2);font-size:12px">No data yet \u2014 change a task status to start tracking</div>';
  } else {
    burn.forEach(function(b) {
      var lbl = b.date.slice(5);
      h += '<div class="burn-bar"><span class="burn-lbl mono">' + lbl + '</span><div class="burn-track" style="position:relative"><div class="burn-done" style="width:' + (b.total?Math.round(b.done/b.total*100):0) + '%"></div></div><span class="burn-ct mono">' + b.done + '/' + b.total + '</span></div>';
    });
  }
  h += '</div>';
  h += '</div>';

  // Up Next
  h += '<div class="dash-card" style="margin-top:0"><h3>Up Next</h3>';
  var upnext = all.filter(function(t){return t.status==="ready"||t.status==="in_progress";}).sort(function(a,b){return (PRI_ORDER[a.pri]||9)-(PRI_ORDER[b.pri]||9);}).slice(0,8);
  if (upnext.length === 0) h += '<div style="color:var(--text2);font-size:12px">No ready tasks</div>';
  upnext.forEach(function(t) {
    var b = branchById(t._branch);
    h += '<div class="upnext-item"><span class="upnext-pri badge-' + t.pri + '" style="padding:2px 8px;border-radius:4px">' + t.pri + '</span><span style="color:' + STATUS_COLORS[t.status] + ';">\u25cf</span><span>' + t.name + '</span><span style="margin-left:auto;font-size:11px;color:var(--text2)">' + (b?b.icon+" "+b.name:"") + '</span></div>';
  });
  h += '</div>';

  el.innerHTML = h;
}

function statCard(n, lbl, col) {
  return '<div class="stat-card"><div class="num mono" style="color:' + col + '">' + n + '</div><div class="lbl">' + lbl + '</div></div>';
}

/* ---- RENDER TASKS ---- */
var taskFilterType = "all";
var taskFilterBranch = "all";

function setFilterType(v) { taskFilterType = v; renderTasks(); }
function setFilterBranch(v) { taskFilterBranch = v; renderTasks(); }

function renderTasks() {
  var el = document.getElementById('view-tasks');
  var h = '';

  // Type filters
  h += '<div class="filters"><strong style="font-size:12px;line-height:28px;margin-right:4px">Type:</strong>';
  ["all","code","ops","vendor","test"].forEach(function(t) {
    h += '<button class="fbtn' + (taskFilterType===t?' active':'') + '" onclick="setFilterType(\'' + t + '\')">' + t.toUpperCase() + '</button>';
  });
  h += '</div>';

  // Branch filters
  h += '<div class="filters"><strong style="font-size:12px;line-height:28px;margin-right:4px">Branch:</strong>';
  h += '<button class="fbtn' + (taskFilterBranch==="all"?' active':'') + '" onclick="setFilterBranch(\'all\')">All</button>';
  state.branches.forEach(function(b) {
    h += '<button class="fbtn' + (taskFilterBranch===b.id?' active':'') + '" onclick="setFilterBranch(\'' + b.id + '\')">' + b.icon + ' ' + b.name + '</button>';
  });
  h += '</div>';

  // Branch sections
  state.branches.forEach(function(b) {
    if (taskFilterBranch !== "all" && taskFilterBranch !== b.id) return;
    var filtered = b.tasks.filter(function(t) {
      if (taskFilterType !== "all" && t.type !== taskFilterType) return false;
      return true;
    });
    if (filtered.length === 0) return;
    var bd = countByStatus(b.tasks,"done"), bt = b.tasks.length, bp = bt?Math.round(bd/bt*100):0;

    h += '<div class="branch-section"><div class="branch-hdr" onclick="toggleBranch(this)"><div class="branch-hdr-left"><span>' + b.icon + '</span><span>' + b.name + '</span></div><div class="branch-hdr-bar"><div class="branch-hdr-fill" style="width:' + bp + '%;background:' + b.color + '"></div></div><span class="branch-hdr-count mono">' + bd + '/' + bt + ' (' + bp + '%)</span><span class="chevron">\u25bc</span></div>';
    h += '<div class="branch-body">';
    filtered.forEach(function(t) {
      h += renderTaskRow(t, b);
    });
    h += '</div></div>';
  });

  el.innerHTML = h;
}

function renderTaskRow(t, b) {
  var h = '<div class="task-row">';
  // Status
  h += '<div class="task-status"><select onchange="changeStatus(\'' + t.id + '\',this.value)" style="background:' + STATUS_COLORS[t.status] + '22;border-color:' + STATUS_COLORS[t.status] + '">';
  ["done","in_progress","ready","todo","blocked","partial","wont_do"].forEach(function(s) {
    h += '<option value="' + s + '"' + (t.status===s?' selected':'') + '>' + s.replace(/_/g,' ') + '</option>';
  });
  h += '</select></div>';
  // Name + badges
  h += '<div><div class="task-name">' + t.name;
  h += ' <span class="badge badge-' + t.type + '">' + t.type.toUpperCase() + '</span>';
  h += ' <span class="badge badge-' + t.pri + '">' + t.pri + '</span>';
  if (t.fix) h += ' <span class="fixed-badge">\u2705 ' + t.fix + '</span>';
  h += '</div>';
  // Meta
  var meta = [];
  if (t.res) meta.push('<span class="task-meta">Resolution: ' + t.res + '</span>');
  if (t.notes) meta.push('<span class="task-meta">Notes: ' + t.notes + '</span>');
  if (t.where) meta.push('<span class="task-where">\ud83d\udccd ' + t.where + '</span>');
  if (t.dep && t.dep.length) {
    if (depsMetFor(t)) {
      meta.push('<span class="task-deps-met">\u2705 deps met</span>');
    } else {
      meta.push('<span class="task-blocked">\ud83d\udd12 blocked by: ' + t.dep.join(', ') + '</span>');
    }
  }
  if (meta.length) h += '<div style="margin-top:2px">' + meta.join(' &middot; ') + '</div>';
  h += '</div>';
  // Priority indicator
  h += '<div style="width:6px;height:6px;border-radius:50%;background:var(--' + t.pri + ');margin-top:6px"></div>';
  h += '</div>';
  return h;
}

function toggleBranch(hdr) {
  hdr.classList.toggle('open');
  var body = hdr.nextElementSibling;
  body.classList.toggle('open');
}

/* ---- RENDER CHANGELOG ---- */
function renderChangelog() {
  var el = document.getElementById('view-changelog');
  var h = '';
  state.changelog.forEach(function(day) {
    h += '<div class="changelog-day"><h3>' + day.date + '</h3>';
    day.entries.forEach(function(e) {
      h += '<div class="cl-entry"><span class="cl-tag cl-tag-' + e.tag + '">' + e.tag + '</span><span>' + e.text + '</span></div>';
    });
    h += '</div>';
  });
  if (state.changelog.length === 0) h = '<div style="color:var(--text2)">No changelog entries yet.</div>';
  el.innerHTML = h;
}

/* ---- ADD TASK ---- */
function toggleAddForm() {
  var f = document.getElementById('addForm');
  f.classList.toggle('open');
  if (f.classList.contains('open')) populateBranchSelect();
}

function populateBranchSelect() {
  var sel = document.getElementById('af-branch');
  sel.innerHTML = '';
  state.branches.forEach(function(b) {
    sel.innerHTML += '<option value="' + b.id + '">' + b.icon + ' ' + b.name + '</option>';
  });
}

function addTask() {
  var name = document.getElementById('af-name').value.trim();
  if (!name) return;
  var branchId = document.getElementById('af-branch').value;
  var pri = document.getElementById('af-pri').value;
  var type = document.getElementById('af-type').value;
  var where = document.getElementById('af-where').value.trim();
  var notes = document.getElementById('af-notes').value.trim();
  var branch = branchById(branchId);
  if (!branch) return;

  var id = "u" + Date.now();
  var task = {id:id,name:name,status:"todo",pri:pri,type:type};
  if (where) task.where = where;
  if (notes) task.notes = notes;

  branch.tasks.push(task);
  addChangelog("fixed", id + " \u2014 " + name + " added");
  saveState();
  toggleAddForm();
  document.getElementById('af-name').value = '';
  document.getElementById('af-where').value = '';
  document.getElementById('af-notes').value = '';
  renderAll();
}

/* ---- INIT ---- */
function renderAll() {
  renderDashboard();
  renderTasks();
  renderChangelog();
}

renderAll();
recordBurndown();
</script>
</body>
</html>

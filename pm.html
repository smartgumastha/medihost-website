<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediHost Command Center v6</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0b;--card:#18181b;--border:#27272a;--text:#e4e4e7;--dim:#a1a1aa;--done:#22c55e;--inp:#f97316;--ready:#3b82f6;--todo:#71717a;--blocked:#ef4444;--partial:#a855f7;--wont:#525252}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.m{font-family:'JetBrains Mono',monospace}
a{color:var(--ready);text-decoration:none}

/* header */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:#111113;flex-wrap:wrap;gap:8px}
header h1{font-size:17px;font-weight:700;letter-spacing:-.4px;white-space:nowrap}
header h1 em{font-style:normal;color:var(--inp)}
.hdr-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.nav-b{padding:6px 14px;border:1px solid var(--border);border-radius:7px;background:0;color:var(--dim);cursor:pointer;font:13px/1 'DM Sans',sans-serif;transition:.15s}
.nav-b.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.nav-b:hover:not(.on){border-color:var(--dim)}
#addBtn{padding:6px 13px;border:1px solid var(--done);border-radius:7px;background:0;color:var(--done);cursor:pointer;font:13px/1 'DM Sans',sans-serif}
#addBtn:hover{background:var(--done);color:#000}

/* layout */
main{max-width:1180px;margin:0 auto;padding:20px 24px}
.v{display:none}.v.on{display:block}

/* stat cards */
.sg{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.sc .n{font-size:26px;font-weight:700;line-height:1}
.sc .l{font-size:10px;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:.6px}

/* dash grid */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.dc{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px}
.dc h3{font-size:13px;font-weight:600;color:var(--dim);margin-bottom:10px}

/* ring */
.rw{display:flex;align-items:center;justify-content:center;position:relative}
.rp{position:absolute;font-size:26px;font-weight:700}

/* branch bars */
.bb{margin-bottom:7px}
.bb-h{display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-bottom:2px}
.bb-t{height:9px;background:var(--border);border-radius:5px;overflow:hidden}
.bb-f{height:100%;border-radius:5px;transition:width .35s}

/* up-next */
.un{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:7px;margin-bottom:5px;font-size:13px}
.un-p{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;text-transform:uppercase}

/* filters */
.fl{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.fb{padding:5px 11px;border:1px solid var(--border);border-radius:6px;background:0;color:var(--dim);cursor:pointer;font:12px/1 'DM Sans',sans-serif}
.fb.on{background:var(--text);color:var(--bg)}

/* branch sections */
.bs{background:var(--card);border:1px solid var(--border);border-radius:11px;margin-bottom:12px;overflow:hidden}
.bh{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;user-select:none}
.bh:hover{background:#1e1e22}
.bh-n{font-weight:600;font-size:14px;flex-shrink:0}
.bh-bar{flex:1;max-width:180px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bh-fill{height:100%;border-radius:3px}
.bh-c{font-size:11px;color:var(--dim);margin-left:auto;white-space:nowrap}
.bh .ch{transition:transform .2s;color:var(--dim);margin-left:6px}
.bh.open .ch{transform:rotate(180deg)}
.bd{display:none;padding:2px 14px 12px}.bd.open{display:block}

/* task row */
.tr{display:grid;grid-template-columns:110px 1fr;gap:8px;align-items:start;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.tr:last-child{border-bottom:0}
.tr select{padding:3px 5px;border-radius:5px;font:11px/1.3 'DM Sans',sans-serif;cursor:pointer;color:var(--text);outline:0}
.tn{font-weight:500}
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-left:3px;vertical-align:middle}
.b-code{background:#1e3a5f;color:#60a5fa}.b-ops{background:#3b2f1a;color:#f59e0b}.b-vendor{background:#2d1f3d;color:#c084fc}.b-test{background:#1a2f2f;color:#2dd4bf}
.b-critical{background:#3b1111;color:#f87171}.b-high{background:#3b2811;color:#fb923c}.b-medium{background:#3b3511;color:#facc15}.b-low{background:#112840;color:#60a5fa}
.fix{background:#052e16;color:#4ade80;padding:1px 6px;border-radius:4px;font-size:10px;margin-left:3px}
.tm{font-size:11px;color:var(--dim);margin-top:2px}
.t-blk{color:var(--blocked);font-size:11px}
.t-ok{color:var(--done);font-size:11px}
.t-where{color:var(--inp);font-size:11px}

/* changelog */
.cld{margin-bottom:16px}
.cld h3{font-size:14px;font-weight:600;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.cle{padding:5px 0;font-size:13px;display:flex;align-items:center;gap:7px}
.clt{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase}
.clt-fixed{background:#052e16;color:#4ade80}.clt-closed{background:#1e1b4b;color:#818cf8}.clt-unblocked{background:#172554;color:#60a5fa}

/* add form */
.af{display:none;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px;margin-bottom:16px}
.af.open{display:block}
.af h3{margin-bottom:10px;font-size:14px}
.fg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fg label{font-size:11px;color:var(--dim);display:flex;flex-direction:column;gap:3px}
.fg input,.fg select{padding:6px 8px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font:12px/1.4 'DM Sans',sans-serif}
.fg .wide{grid-column:span 3}
.fa{margin-top:10px;display:flex;gap:6px}
.fa button{padding:7px 16px;border-radius:7px;border:0;cursor:pointer;font:13px/1 'DM Sans',sans-serif}
.fa .sv{background:var(--done);color:#000;font-weight:600}
.fa .cn{background:var(--border);color:var(--text)}

@media(max-width:700px){.sg{grid-template-columns:repeat(3,1fr)}.dg{grid-template-columns:1fr}.fg{grid-template-columns:1fr 1fr}.fg .wide{grid-column:span 2}}
</style>
</head>
<body>
<header>
  <h1>Medi<em>Host</em> Command Center <span style="font-weight:400;color:var(--dim);font-size:11px">v6</span></h1>
  <div class="hdr-right">
    <button class="nav-b on" data-v="dashboard">Dashboard</button>
    <button class="nav-b" data-v="tasks">All Tasks</button>
    <button class="nav-b" data-v="changelog">Changelog</button>
    <button id="addBtn" onclick="toggleForm()">+ Add Task</button>
  </div>
</header>
<main>
  <div class="af" id="aForm">
    <h3>New Task</h3>
    <div class="fg">
      <label>Name<input id="af-n" placeholder="Task name"></label>
      <label>Branch<select id="af-b"></select></label>
      <label>Priority<select id="af-p"><option value="critical">Critical</option><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></label>
      <label>Type<select id="af-t"><option value="code">CODE</option><option value="ops">OPS</option><option value="vendor">VENDOR</option><option value="test">TEST</option></select></label>
      <label>Deadline<input id="af-d" type="date"></label>
      <label>Notes<input id="af-no" placeholder="Notes"></label>
    </div>
    <div class="fa">
      <button class="sv" onclick="addTask()">Add</button>
      <button class="cn" onclick="toggleForm()">Cancel</button>
    </div>
  </div>
  <div class="v on" id="v-dashboard"></div>
  <div class="v" id="v-tasks"></div>
  <div class="v" id="v-changelog"></div>
</main>
<script>
var KEY = "medihost-cmd-v6";
var SC = {done:"#22c55e",in_progress:"#f97316",ready:"#3b82f6",todo:"#71717a",blocked:"#ef4444",partial:"#a855f7",wont_do:"#525252"};
var PO = {critical:0,high:1,medium:2,low:3};

var DEF_B = [
  {id:"b1",name:"HMS Backbone",color:"#ef4444",icon:"\ud83c\udfe5",tasks:[
    {id:"t1",name:"V44 apiRequest\u2192api.get fix",status:"done",pri:"critical",type:"code",fix:"Apr 5",res:"Verified \u2014 never broken"},
    {id:"t2",name:"Test full OPD flow E2E",status:"ready",pri:"critical",type:"code"},
    {id:"t3",name:"Collection reports",status:"todo",pri:"high",type:"code",dep:["t2"]},
    {id:"t4",name:"Prescription gen + print",status:"todo",pri:"high",type:"code",dep:["t2"]},
    {id:"t5",name:"Multi-branch support",status:"todo",pri:"high",type:"code",dep:["t2"]},
    {id:"t6",name:"Pharmacy stock mgmt",status:"todo",pri:"medium",type:"code",dep:["t4"]},
    {id:"t7",name:"LIS \u2192 billing",status:"todo",pri:"medium",type:"code",dep:["t2"]},
    {id:"t8",name:"Appointment \u2192 queue",status:"todo",pri:"medium",type:"code",dep:["t2"]}
  ]},
  {id:"b2",name:"MediHost Platform",color:"#3b82f6",icon:"\ud83c\udf10",tasks:[
    {id:"t9",name:"Admin pricing save fix",status:"done",pri:"critical",type:"code",fix:"Apr 5",res:"subscription_plan \u2192 plan_tier"},
    {id:"t10",name:"Signup pipeline E2E",status:"partial",pri:"critical",type:"code"},
    {id:"t45",name:"Module gating fix",status:"done",pri:"high",type:"code",fix:"Apr 5",res:"shared modules.js + dedup"},
    {id:"t11",name:"Welcome page live link",status:"todo",pri:"high",type:"code",dep:["t10"]},
    {id:"t12",name:"Partner dashboard editor",status:"todo",pri:"high",type:"code",dep:["t10"]},
    {id:"t13",name:"Partner dashboard doctors",status:"todo",pri:"high",type:"code",dep:["t12"]},
    {id:"t14",name:"Partner dashboard orders",status:"todo",pri:"high",type:"code",dep:["t12"]},
    {id:"t15",name:"Dashboard analytics",status:"todo",pri:"medium",type:"code",dep:["t14"]},
    {id:"t16",name:"Onboarding wizard",status:"todo",pri:"medium",type:"code",dep:["t12","t13"]},
    {id:"t17",name:"Admin partner mgmt",status:"todo",pri:"medium",type:"code"},
    {id:"t18",name:"Plan enforcement",status:"todo",pri:"medium",type:"code",dep:["t16"]}
  ]},
  {id:"b3",name:"Storefront",color:"#22c55e",icon:"\ud83d\uded2",tasks:[
    {id:"t19",name:"First client domain setup",status:"todo",pri:"critical",type:"code"},
    {id:"t46",name:"Booking appt vs service fix",status:"todo",pri:"high",type:"code"},
    {id:"t20",name:"Razorpay checkout",status:"todo",pri:"high",type:"code"},
    {id:"t21",name:"Mobile responsiveness",status:"todo",pri:"high",type:"code"},
    {id:"t22",name:"Doctor profile SEO",status:"todo",pri:"medium",type:"code"},
    {id:"t23",name:"Real-time slots",status:"todo",pri:"medium",type:"code",dep:["t8"]},
    {id:"t24",name:"Template variants",status:"todo",pri:"low",type:"code"}
  ]},
  {id:"b4",name:"WhatsApp AI",color:"#16a34a",icon:"\ud83d\udcac",tasks:[
    {id:"t25",name:"WA DB tables",status:"todo",pri:"high",type:"code"},
    {id:"t26",name:"Meta Cloud API",status:"todo",pri:"high",type:"code",dep:["t25"]},
    {id:"t27",name:"6 message flows",status:"todo",pri:"high",type:"code",dep:["t26"]},
    {id:"t28",name:"AI chatbot",status:"todo",pri:"medium",type:"code",dep:["t27"]},
    {id:"t29",name:"Opt-in compliance",status:"todo",pri:"medium",type:"code",dep:["t26"]}
  ]},
  {id:"b5",name:"Commerce",color:"#f97316",icon:"\ud83d\udce6",tasks:[
    {id:"t30",name:"Cart + checkout",status:"todo",pri:"high",type:"code",dep:["t20"]},
    {id:"t31",name:"Lab booking",status:"todo",pri:"high",type:"code",dep:["t30"]},
    {id:"t32",name:"Pharmacy Rx upload",status:"todo",pri:"high",type:"code",dep:["t30","t6"]},
    {id:"t33",name:"HMS order relay (MOAT)",status:"todo",pri:"critical",type:"code",dep:["t30","t2"]},

  ]},
  {id:"b6",name:"GBP + Marketing",color:"#a855f7",icon:"\ud83d\udce3",tasks:[

    {id:"t36",name:"Auto-sync GBP",status:"todo",pri:"medium",type:"code",dep:["t35"]},
    {id:"t37",name:"Review dashboard",status:"todo",pri:"medium",type:"code",dep:["t35"]},
    {id:"t38",name:"AI campaign engine",status:"todo",pri:"medium",type:"code",dep:["t27"]},
    {id:"t39",name:"Content library",status:"todo",pri:"low",type:"code",dep:["t38"]}
  ]},
  {id:"b7",name:"Hemato Marketplace",color:"#14b8a6",icon:"\ud83c\udfea",tasks:[
    {id:"t40",name:"Marketplace DB",status:"todo",pri:"medium",type:"code"},
    {id:"t41",name:"Search + compare",status:"todo",pri:"medium",type:"code",dep:["t40"]},
    {id:"t42",name:"Marketplace ordering",status:"todo",pri:"medium",type:"code",dep:["t41","t30"]},
    {id:"t43",name:"Commission system",status:"todo",pri:"medium",type:"code",dep:["t42"]},
    {id:"t44",name:"Wallet + referrals",status:"todo",pri:"low",type:"code",dep:["t43"]}
  ]},
  {id:"b8",name:"Ops & Vendors",color:"#71717a",icon:"\ud83d\udd27",tasks:[
    {id:"n01",name:"DMARC record",status:"todo",pri:"high",type:"ops",where:"RC DNS panel"},
    {id:"n11",name:"Razorpay KYC",status:"todo",pri:"high",type:"vendor",where:"Razorpay"},
    {id:"n20",name:"Call friend \u2014 clinic data",status:"todo",pri:"critical",type:"ops",where:"WhatsApp/call"},
    {id:"n35",name:"Submit WA templates (24-48hr!)",status:"todo",pri:"high",type:"vendor",where:"Meta Business Suite"},
    {id:"n43",name:"GA4 for medihost.in",status:"todo",pri:"high",type:"ops",where:"analytics.google.com"},
    {id:"n47",name:"Test pricing save fix",status:"todo",pri:"high",type:"test",where:"medihost.in admin"},
    {id:"n48",name:"Test module gating",status:"todo",pri:"high",type:"test",where:"medihost.in dashboard"},
    {id:"n49",name:"Test OPD flow",status:"todo",pri:"critical",type:"test",where:"app.hemato.in"},
    {id:"n53",name:"Draft Terms of Service",status:"todo",pri:"high",type:"ops",where:"Document"}
  ]}
];

var DEF_CL = [{date:"Apr 5 Night",entries:[
  {tag:"closed",text:"t1 \u2014 V44 apiRequest\u2192api.get fix verified, never broken"},
  {tag:"fixed",text:"t9 \u2014 Admin pricing save fix (subscription_plan \u2192 plan_tier)"},
  {tag:"fixed",text:"t45 \u2014 Module gating fix (shared modules.js + dedup)"}
]}];

/* --- state --- */
var S = load();
function load(){try{var d=JSON.parse(localStorage.getItem(KEY));if(d&&d.branches)return d}catch(e){}return{branches:JSON.parse(JSON.stringify(DEF_B)),changelog:JSON.parse(JSON.stringify(DEF_CL))}}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}

/* --- helpers --- */
function allT(){var o=[];S.branches.forEach(function(b){b.tasks.forEach(function(t){t._b=b.id;o.push(t)})});return o}
function findT(id){var a=allT();for(var i=0;i<a.length;i++)if(a[i].id===id)return a[i];return null}
function brById(id){for(var i=0;i<S.branches.length;i++)if(S.branches[i].id===id)return S.branches[i];return null}
function cnt(arr,st){var c=0;arr.forEach(function(t){if(t.status===st)c++});return c}
function depsMet(t){if(!t.dep||!t.dep.length)return true;for(var i=0;i<t.dep.length;i++){var d=findT(t.dep[i]);if(!d||d.status!=="done")return false}return true}
function today(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}

function autoUnblock(){
  var ch=false;
  allT().forEach(function(t){
    if(t.status==="blocked"&&depsMet(t)){t.status="ready";ch=true;addCL("unblocked",t.id+" \u2014 "+t.name+" auto-unblocked")}
  });
  if(ch)save();
}
function addCL(tag,text){
  var td=today(),day=null;
  for(var i=0;i<S.changelog.length;i++){if(S.changelog[i].date===td){day=S.changelog[i];break}}
  if(!day){day={date:td,entries:[]};S.changelog.unshift(day)}
  day.entries.unshift({tag:tag,text:text});
}
function chgStatus(id,ns){
  var t=findT(id);if(!t)return;
  var old=t.status;t.status=ns;
  if(ns==="done"&&old!=="done")addCL("fixed",t.id+" \u2014 "+t.name+" completed");
  autoUnblock();save();renderAll();
}

/* --- NAV --- */
document.querySelectorAll('.nav-b').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.nav-b').forEach(function(x){x.classList.remove('on')});
    b.classList.add('on');
    document.querySelectorAll('.v').forEach(function(x){x.classList.remove('on')});
    document.getElementById('v-'+b.dataset.v).classList.add('on');
  });
});

/* --- DASHBOARD --- */
function renderDash(){
  var el=document.getElementById('v-dashboard');
  var all=allT(),total=all.length,done=cnt(all,"done"),inp=cnt(all,"in_progress"),rdy=cnt(all,"ready"),blk=cnt(all,"blocked");
  var crit=0;all.forEach(function(t){if(t.pri==="critical"&&t.status!=="done")crit++});
  var pct=total?Math.round(done/total*100):0;
  var rc=pct<30?"#ef4444":pct<60?"#f97316":"#22c55e";
  var circ=2*Math.PI*70,off=circ-(pct/100)*circ;

  var h='<div class="sg">';
  h+=sc(total,"Total","var(--text)")+sc(done,"Done","var(--done)")+sc(inp,"In Progress","var(--inp)");
  h+=sc(rdy,"Ready","var(--ready)")+sc(blk,"Blocked","var(--blocked)")+sc(crit,"Critical","var(--blocked)");
  h+='</div><div class="dg">';

  /* ring */
  h+='<div class="dc"><h3>Overall Progress</h3><div class="rw">';
  h+='<svg width="160" height="160" viewBox="0 0 160 160"><circle cx="80" cy="80" r="70" fill="none" stroke="var(--border)" stroke-width="12"/>';
  h+='<circle cx="80" cy="80" r="70" fill="none" stroke="'+rc+'" stroke-width="12" stroke-linecap="round" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'" transform="rotate(-90 80 80)" style="transition:stroke-dashoffset .5s"/>';
  h+='</svg><div class="rp m" style="color:'+rc+'">'+pct+'%</div></div></div>';

  /* branch bars */
  h+='<div class="dc"><h3>Branch Progress</h3>';
  S.branches.forEach(function(b){
    var bd=cnt(b.tasks,"done"),bt=b.tasks.length,bp=bt?Math.round(bd/bt*100):0;
    h+='<div class="bb"><div class="bb-h"><span>'+b.icon+' '+b.name+'</span><span class="m" style="font-size:11px">'+bd+'/'+bt+'</span></div>';
    h+='<div class="bb-t"><div class="bb-f" style="width:'+bp+'%;background:'+b.color+'"></div></div></div>';
  });
  h+='</div></div>';

  /* up next */
  h+='<div class="dc"><h3>Up Next</h3>';
  var up=all.filter(function(t){return t.status==="ready"||t.status==="in_progress"}).sort(function(a,b){return(PO[a.pri]||9)-(PO[b.pri]||9)}).slice(0,10);
  if(!up.length)h+='<div style="color:var(--dim);font-size:12px">No tasks ready</div>';
  up.forEach(function(t){
    var b=brById(t._b);
    h+='<div class="un"><span class="un-p b-'+t.pri+'">'+t.pri+'</span>';
    h+='<span style="color:'+SC[t.status]+'">&#9679;</span>';
    h+='<span>'+t.name+'</span>';
    h+='<span style="margin-left:auto;font-size:11px;color:var(--dim)">'+(b?b.icon+' '+b.name:'')+'</span></div>';
  });
  h+='</div>';
  el.innerHTML=h;
}
function sc(n,l,c){return'<div class="sc"><div class="n m" style="color:'+c+'">'+n+'</div><div class="l">'+l+'</div></div>'}

/* --- TASKS --- */
function renderTasks(){
  var el=document.getElementById('v-tasks');
  var h='';
  S.branches.forEach(function(b){
    var bd=cnt(b.tasks,"done"),bt=b.tasks.length,bp=bt?Math.round(bd/bt*100):0;
    h+='<div class="bs"><div class="bh" onclick="togBr(this)">';
    h+='<span class="bh-n">'+b.icon+' '+b.name+'</span>';
    h+='<div class="bh-bar"><div class="bh-fill" style="width:'+bp+'%;background:'+b.color+'"></div></div>';
    h+='<span class="bh-c m">'+bd+'/'+bt+' ('+bp+'%)</span>';
    h+='<span class="ch">&#9660;</span></div>';
    h+='<div class="bd">';
    b.tasks.forEach(function(t){h+=tRow(t)});
    h+='</div></div>';
  });
  el.innerHTML=h;
}
function tRow(t){
  var h='<div class="tr"><div><select onchange="chgStatus(\''+t.id+'\',this.value)" style="background:'+SC[t.status]+'22;border:1px solid '+SC[t.status]+'">';
  ["done","in_progress","ready","todo","blocked","partial","wont_do"].forEach(function(s){
    h+='<option value="'+s+'"'+(t.status===s?' selected':'')+'>'+s.replace(/_/g,' ')+'</option>';
  });
  h+='</select></div><div><div class="tn">'+t.name;
  h+=' <span class="badge b-'+t.type+'">'+t.type.toUpperCase()+'</span>';
  h+=' <span class="badge b-'+t.pri+'">'+t.pri+'</span>';
  if(t.fix)h+=' <span class="fix">\u2705 '+t.fix+'</span>';
  h+='</div>';
  var m=[];
  if(t.res)m.push('<span class="tm">Resolution: '+t.res+'</span>');
  if(t.notes)m.push('<span class="tm">'+t.notes+'</span>');
  if(t.where)m.push('<span class="t-where">\ud83d\udccd '+t.where+'</span>');
  if(t.dep&&t.dep.length){
    if(depsMet(t))m.push('<span class="t-ok">\u2705 deps met</span>');
    else m.push('<span class="t-blk">\ud83d\udd12 blocked by: '+t.dep.join(', ')+'</span>');
  }
  if(m.length)h+='<div style="margin-top:2px">'+m.join(' \u00b7 ')+'</div>';
  h+='</div></div>';
  return h;
}
function togBr(el){el.classList.toggle('open');el.nextElementSibling.classList.toggle('open')}

/* --- CHANGELOG --- */
function renderCL(){
  var el=document.getElementById('v-changelog'),h='';
  S.changelog.forEach(function(d){
    h+='<div class="cld"><h3>'+d.date+'</h3>';
    d.entries.forEach(function(e){
      h+='<div class="cle"><span class="clt clt-'+e.tag+'">'+e.tag+'</span><span>'+e.text+'</span></div>';
    });
    h+='</div>';
  });
  if(!S.changelog.length)h='<div style="color:var(--dim)">No entries yet.</div>';
  el.innerHTML=h;
}

/* --- ADD TASK --- */
function toggleForm(){
  var f=document.getElementById('aForm');f.classList.toggle('open');
  if(f.classList.contains('open')){
    var sel=document.getElementById('af-b');sel.innerHTML='';
    S.branches.forEach(function(b){sel.innerHTML+='<option value="'+b.id+'">'+b.icon+' '+b.name+'</option>'});
  }
}
function addTask(){
  var name=document.getElementById('af-n').value.trim();if(!name)return;
  var br=brById(document.getElementById('af-b').value);if(!br)return;
  var task={id:"u"+Date.now(),name:name,status:"todo",pri:document.getElementById('af-p').value,type:document.getElementById('af-t').value};
  var notes=document.getElementById('af-no').value.trim();if(notes)task.notes=notes;
  br.tasks.push(task);
  addCL("fixed",task.id+" \u2014 "+name+" added");
  save();toggleForm();
  document.getElementById('af-n').value='';document.getElementById('af-no').value='';
  renderAll();
}

/* --- INIT --- */
function renderAll(){renderDash();renderTasks();renderCL()}
renderAll();
</script>
